# ─────────────────────────────────────────────────────────────
# Blue Splash Waterpark — Netlify Configuration
# ─────────────────────────────────────────────────────────────

[build]
  # Static site — no build framework needed
  publish = "."
  functions = "netlify/functions"

# ─────────────────────────────────────────────────────────────
# Serverless Functions Config
# ─────────────────────────────────────────────────────────────
[functions]
  node_bundler = "esbuild"

# ─────────────────────────────────────────────────────────────
# Redirects: Clean URLs for HTML pages
# ─────────────────────────────────────────────────────────────
[[redirects]]
  from = "/events"
  to   = "/events.html"
  status = 200

# API routes → Netlify Functions
[[redirects]]
  from = "/api/create-order"
  to   = "/.netlify/functions/create-order"
  status = 200

[[redirects]]
  from = "/api/verify-payment"
  to   = "/.netlify/functions/verify-payment"
  status = 200

# ─────────────────────────────────────────────────────────────
# Security Headers (Production Best Practice)
# ─────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains; preload"

# Static assets — long cache
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
